name: Publish to MCP Registry

on:
  workflow_dispatch: # run AFTER npm publish (registry validates package's mcpName)

permissions:
  contents: read
  id-token: write # GitHub OIDC -> namespace io.github.hei33enberg/*

jobs:
  publish-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/ || mv mcp-publisher ./mcp-publisher
      - name: Login (GitHub OIDC) & publish server.json
        run: |
          (mcp-publisher login github-oidc || ./mcp-publisher login github-oidc)
          (mcp-publisher publish || ./mcp-publisher publish)
